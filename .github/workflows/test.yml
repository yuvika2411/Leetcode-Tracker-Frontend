name: Test Check

on:
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Tests with Coverage
        run: npm run test:coverage

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Run Unit and Integration Tests
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/test_db
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
        run: ./mvnw clean verify -q

  test-failed-jobs-summary:
    name: Summarize Test Failures
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    if: failure()
    outputs:
      failed_jobs: ${{ steps.summary.outputs.failed_jobs }}
    steps:
      - name: Build summary
        id: summary
        run: |
          parts=""
          if [ "${{ needs.test-frontend.result }}" == "failure" ]; then
            parts="Frontend Tests"
          fi
          if [ "${{ needs.test-backend.result }}" == "failure" ]; then
            parts="${parts:+$parts, }Backend Tests"
          fi
          echo "failed_jobs=$parts" >> "$GITHUB_OUTPUT"

  report-failure:
    name: Report Test Failure
    needs: [test-frontend, test-backend, test-failed-jobs-summary]
    if: failure()
    uses: ./.github/workflows/report-failure.yml
    with:
      check_type: Test
      failed_jobs: ${{ needs.test-failed-jobs-summary.outputs.failed_jobs }}
      pr_number: ${{ github.event.pull_request.number }}
      pr_title: ${{ github.event.pull_request.title }}
      head_ref: ${{ github.head_ref }}
      base_ref: ${{ github.base_ref }}
      run_id: ${{ github.run_id }}
