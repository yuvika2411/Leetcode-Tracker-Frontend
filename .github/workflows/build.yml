name: Build Check

on:
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'Frontend/**'
            backend:
              - 'Backend/**'

  build-frontend:
    name: Build Frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  build-backend:
    name: Build Backend
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build with Maven
        run: ./mvnw package -DskipTests -q

  build-status:
    name: Build Status Gate
    runs-on: ubuntu-latest
    needs: [detect-changes, build-frontend, build-backend]
    if: always()
    steps:
      - name: Check build results
        run: |
          frontend_changed="${{ needs.detect-changes.outputs.frontend }}"
          backend_changed="${{ needs.detect-changes.outputs.backend }}"
          frontend_result="${{ needs.build-frontend.result }}"
          backend_result="${{ needs.build-backend.result }}"

          failed=false

          if [ "$frontend_changed" == "true" ] && [ "$frontend_result" != "success" ]; then
            echo "Frontend build failed"
            failed=true
          fi
          if [ "$backend_changed" == "true" ] && [ "$backend_result" != "success" ]; then
            echo "Backend build failed"
            failed=true
          fi

          if [ "$failed" == "true" ]; then
            exit 1
          fi

          echo "All required builds passed"

  summarize-build-failures:
    name: Summarize Build Failures
    runs-on: ubuntu-latest
    needs: [detect-changes, build-frontend, build-backend]
    if: |
      always() &&
      (
        (needs.detect-changes.outputs.frontend == 'true' && needs.build-frontend.result == 'failure') ||
        (needs.detect-changes.outputs.backend  == 'true' && needs.build-backend.result  == 'failure')
      )
    outputs:
      failed_jobs: ${{ steps.summary.outputs.failed_jobs }}
    steps:
      - name: Build summary
        id: summary
        run: |
          parts=""
          if [ "${{ needs.detect-changes.outputs.frontend }}" == "true" ] && [ "${{ needs.build-frontend.result }}" == "failure" ]; then
            parts="Frontend Build"
          fi
          if [ "${{ needs.detect-changes.outputs.backend }}" == "true" ] && [ "${{ needs.build-backend.result }}" == "failure" ]; then
            parts="${parts:+$parts, }Backend Build"
          fi
          echo "failed_jobs=$parts" >> "$GITHUB_OUTPUT"

  report-failure:
    name: Report Build Failure
    needs: [detect-changes, build-frontend, build-backend, summarize-build-failures]
    if: |
      always() &&
      (
        (needs.detect-changes.outputs.frontend == 'true' && needs.build-frontend.result == 'failure') ||
        (needs.detect-changes.outputs.backend  == 'true' && needs.build-backend.result  == 'failure')
      )
    uses: ./.github/workflows/report-failure.yml
    with:
      check_type: Build
      failed_jobs: ${{ needs.summarize-build-failures.outputs.failed_jobs }}
      pr_number: ${{ github.event.pull_request.number }}
      pr_title: ${{ github.event.pull_request.title }}
      head_ref: ${{ github.head_ref }}
      base_ref: ${{ github.base_ref }}
      run_id: ${{ github.run_id }}
