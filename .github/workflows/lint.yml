name: Lint Check

on:
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  lint-frontend:
    name: Frontend ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  lint-backend:
    name: Backend Checkstyle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Run Maven compile (lint check)
        run: ./mvnw compile -q

  build-failed-jobs-summary:
    name: Summarize Lint Failures
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend]
    if: failure()
    outputs:
      failed_jobs: ${{ steps.summary.outputs.failed_jobs }}
    steps:
      - name: Build summary
        id: summary
        run: |
          parts=""
          if [ "${{ needs.lint-frontend.result }}" == "failure" ]; then
            parts="Frontend ESLint"
          fi
          if [ "${{ needs.lint-backend.result }}" == "failure" ]; then
            parts="${parts:+$parts, }Backend Compile"
          fi
          echo "failed_jobs=$parts" >> "$GITHUB_OUTPUT"

  report-failure:
    name: Report Lint Failure
    needs: [lint-frontend, lint-backend, build-failed-jobs-summary]
    if: failure()
    uses: ./.github/workflows/report-failure.yml
    with:
      check_type: Lint
      failed_jobs: ${{ needs.build-failed-jobs-summary.outputs.failed_jobs }}
      pr_number: ${{ github.event.pull_request.number }}
      pr_title: ${{ github.event.pull_request.title }}
      head_ref: ${{ github.head_ref }}
      base_ref: ${{ github.base_ref }}
      run_id: ${{ github.run_id }}
